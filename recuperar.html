<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contrasena | Melomanos</title>

    <link rel="stylesheet" href="CSS/Style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Pagina para restablecer la contrasena. Solo diseno. -->
    <main class="pagina-auth">
        <div class="auth-tarjeta">

            <div class="avatar"><i class="fa-solid fa-lock"></i></div>
            <h1>Restablece tu contrasena</h1>
            <p class="subtitulo">Te enviaremos un correo electronico con mas instrucciones sobre como restablecer tu contrasena.</p>

            <div class="campo">
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com">
            </div>

            <button class="boton-completo">
                <i class="fa-solid fa-paper-plane"></i>&nbsp; Enviar un email
            </button>

            <a href="login.html" class="volver"><i class="fa-solid fa-arrow-left"></i> Volver a iniciar sesion</a>

        </div>
    </main>

</body>
</html>

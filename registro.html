<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse | Melomanos</title>

    <link rel="stylesheet" href="CSS/Style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Pagina de registro. Es solo diseno, no guarda nada. -->
    <main class="pagina-auth">
        <div class="registro-tarjeta">

            <!-- Panel izquierdo: formulario de registro -->
            <div class="registro-form">
                <h1>Registrarse</h1>

                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre completo">
                </div>

                <div class="campo">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com">
                </div>

                <div class="campo">
                    <label for="pass1">Contrasena</label>
                    <input type="password" id="pass1" placeholder="Crea una contrasena">
                </div>

                <div class="campo">
                    <label for="pass2">Confirmar contrasena</label>
                    <input type="password" id="pass2" placeholder="Repite la contrasena">
                </div>

                <button class="boton-completo">Registrarse</button>
            </div>

            <!-- Panel derecho: accesos con redes sociales -->
            <div class="registro-social">
                <h2>Iniciar sesion</h2>

                <a href="#" class="boton-social">
                    <i class="fa-brands fa-facebook-f"></i> Acceder con Facebook
                </a>
                <a href="#" class="boton-social">
                    <i class="fa-brands fa-google"></i> Acceder con Google
                </a>
                <a href="#" class="boton-social">
                    <i class="fa-solid fa-envelope"></i> Acceder con Correo
                </a>

                <a href="login.html" class="volver" style="color:var(--negro); opacity:.8; margin-top:24px;">
                    <i class="fa-solid fa-arrow-left"></i> Ya tengo cuenta
                </a>
            </div>

        </div>
    </main>

</body>
</html>
